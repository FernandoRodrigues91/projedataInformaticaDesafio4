<div class="user-list">
  <div class="topo-lista">
    <input
      type="text"
      [formControl]="filtroNome"
      placeholder="Buscar por nome..."
    />

    <button mat-raised-button color="warn" (click)="abrirModalCriar()">
      Novo usuário
    </button>
  </div>

  <p *ngIf="carregando()">Carregando usuários...</p>

  <p *ngIf="erro()" class="erro">
    {{ erro() }}
    <button (click)="carregarUsuarios()">Tentar novamente</button>
  </p>

  <div class="user-card" *ngFor="let usuario of usuarios()">
    <h3>{{ usuario.nome }}</h3>
    <p>{{ usuario.email }}</p>
    <button (click)="abrirModalEditar(usuario)">Editar</button>
  </div>
</div>
